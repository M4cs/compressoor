interface:
  display_name: "Compressoor"
  short_description: "Default execution-first context compression across projects"
  default_prompt: "Use $compressoor by default across projects to keep working context compact, preserve technical atoms exactly, act before explaining, and avoid narrating each step. These requirements apply to all agents and sub-agents using this workspace. Tool calls first: if a tool can materially advance the task, take that tool action before any optional progress or summary text, and do not send any human-readable pre-tool status message first. Do not send progress updates unless the environment requires one, and do not send routine plaintext progress updates. If the environment requires an update, emit only the true encoder-produced packed CCM1/template context instead of human-readable status text or a hand-written packed-looking paraphrase. Required updates, reusable memory, and handoffs must use compressoor methods rather than plaintext. When compacting reusable context, encode it with compressoor, store the encoded context, replace the verbose form with CCM1 or compact envelopes as the new active context by default, and continue from that packed state. Keep final summaries extremely terse: short outcome, key verification, and only material remaining risk."

policy:
  allow_implicit_invocation: true
